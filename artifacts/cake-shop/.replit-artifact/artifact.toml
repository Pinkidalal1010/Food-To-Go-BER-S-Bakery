kind = "web"
previewPath = "/"
title = "Food 2 Go - Ber's Bakery"
version = "1.0.0"
id = "artifacts/cake-shop"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25078

[services.development]
run = "pnpm --filter @workspace/cake-shop run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cake-shop", "run", "build" ]
publicDir = "artifacts/cake-shop/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25078"
BASE_PATH = "/"
